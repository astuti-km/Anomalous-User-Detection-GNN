<!DOCTYPE html>
<html>
<head>
    <title>Anomalous Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>⚡ AnomalyAI</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
    </div>
</nav>

<div class="glass-card">
    <h1>Detect Suspicious Users</h1>
<p style="color:#aaa;">AI-powered anomaly detection system</p>

    <input type="text" id="inputData" placeholder="e.g. 0.2, 0.8, 0.6">

    <button id="analyzeBtn">Analyze 🚀</button>
    <div id="resultBox" style="display:none; margin-top:20px; text-align:center;">
    <h2>🔍 Prediction Result</h2>
    <p id="resultText" style="font-size:20px; font-weight:bold;"></p>
    <button onclick="window.location.replace('index.html')">Try Again</button>>
</div>
</div>
<div id="popup" class="popup">
    <div class="popup-content">
        <h2>🔍 Prediction Result</h2>
        <p id="popupResult"></p>
        <p id="popupMsg"></p>
        <button onclick="closePopup()">Try Again</button>
    </div>
</div>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>
</html>
